name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # The KB-validation gate stops a domain-expert typo from shipping a broken assessment.
      - run: npm run validate:kb
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
